apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ruoyi-modules-iot-hpa
  namespace: ruoyi
  labels:
    app: ruoyi-modules-iot
    tier: microservice
spec:
  # HPA 绑定针对的微服务 Deploy 目标
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ruoyi-modules-iot
  # 弹性克隆副本数范围：常驻 3 尊真身分流，暴雨期最高扩容到 6 个分身抗洪
  minReplicas: 3
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # 核心削峰策略：当该微服务平均 CPU 占用率超过 60% 时自动唤醒克隆流程
          averageUtilization: 60
  # 智能防震荡扩缩容行为调校 (Behavior Policies)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0 # 突发洪峰一微秒都不要等，无冷却窗口，立刻开始复制扩容
      policies:
        - type: Percent
          value: 100               # 瞬时可扩容 100% 实例，直接翻倍
          periodSeconds: 15        # 每 15 秒重新评估，确保秒级抗下海啸流量
    scaleDown:
      stabilizationWindowSeconds: 300 # 险情退去后设定 5 分钟 (300秒) 缓慢冷却，严禁缩容震荡，保证系统平稳过渡
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
