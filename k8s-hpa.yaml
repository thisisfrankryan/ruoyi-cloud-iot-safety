apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ruoyi-modules-iot-hpa
  namespace: ruoyi
  labels:
    app: ruoyi-modules-iot
    tier: microservice
spec:
  # HPA 绑定的微服务 Deployment
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ruoyi-modules-iot
  # 副本数范围：默认 3 个实例，负载升高时最多扩容到 6 个实例
  minReplicas: 3
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # 当 IoT 微服务平均 CPU 使用率超过 60% 时触发扩容
          averageUtilization: 60
  # 扩缩容行为配置，降低频繁抖动
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0 # 扩容不设置稳定窗口，便于快速响应流量上升
      policies:
        - type: Percent
          value: 100               # 每次最多按当前实例数 100% 扩容
          periodSeconds: 15        # 每 15 秒重新评估一次
    scaleDown:
      stabilizationWindowSeconds: 300 # 缩容设置 5 分钟稳定窗口，避免短时间内频繁伸缩
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
